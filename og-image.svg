<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A0612"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#D4A0C8" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#1A0612" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative top-left circle -->
  <circle cx="80" cy="80" r="120" fill="#D4A0C8" fill-opacity="0.04"/>
  <!-- Decorative bottom-right circle -->
  <circle cx="1120" cy="550" r="150" fill="#D4A0C8" fill-opacity="0.04"/>

  <!-- Logo mark: NR monogram -->
  <rect x="542" y="138" width="116" height="116" rx="20" ry="20" fill="#D4A0C8" fill-opacity="0.12"/>
  <text
    x="600"
    y="221"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="700"
    fill="#D4A0C8"
    letter-spacing="-2">NR</text>

  <!-- Main title -->
  <text
    x="600"
    y="330"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="92"
    font-weight="800"
    fill="#D4A0C8"
    letter-spacing="-3">NexRelia</text>

  <!-- Divider line -->
  <line x1="460" y1="368" x2="740" y2="368" stroke="#D4A0C8" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Tagline -->
  <text
    x="600"
    y="420"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#E8C8E0"
    letter-spacing="0.5"
    fill-opacity="0.85">İlişkilerinizi keşfedin, anlayın ve güçlendirin</text>

  <!-- Sub-tagline -->
  <text
    x="600"
    y="466"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#E8C8E0"
    fill-opacity="0.45">AI Destekli İlişki Koçu</text>
</svg>
